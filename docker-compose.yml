version: '3.8'

services:
  megasoluciones:
    build: .
    container_name: megasoluciones-web
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=megasoluciones-docker-secret-key-2026
      - FLASK_ENV=production
    restart: unless-stopped
    volumes:
      - ./static:/app/static:ro
      - ./templates:/app/templates:ro
    networks:
      - megasoluciones-network

networks:
  megasoluciones-network:
    driver: bridge
