version: '3.8'

services:
  megasoluciones:
    build: .
    container_name: megasoluciones-web
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=megasoluciones-docker-secret-key-2026
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./static:/app/static:ro
      - ./templates:/app/templates:ro
    networks:
      - megasoluciones-network

networks:
  megasoluciones-network:
    driver: bridge
