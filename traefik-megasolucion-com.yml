# megasolucion.com + www → proxy Flask (301 a .es en la app; GSC validado)
# NO usar "redirect:" — esta versión Traefik no lo soporta (rompe todo con 404)
#
# Copiar: sudo cp traefik-megasolucion-com.yml /etc/dokploy/traefik/dynamic/megasolucion-com.yml
#         docker restart dokploy-traefik
http:
  routers:
    megasolucion-com-http:
      rule: Host(`megasolucion.com`) || Host(`www.megasolucion.com`)
      service: megasolucion-com-service
      middlewares:
        - redirect-to-https
      entryPoints:
        - web
    megasolucion-com-https:
      rule: Host(`megasolucion.com`) || Host(`www.megasolucion.com`)
      service: megasolucion-com-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
        domains:
          - main: megasolucion.com
            sans:
              - www.megasolucion.com

  services:
    megasolucion-com-service:
      loadBalancer:
        servers:
          - url: http://10.0.0.1:5000
        passHostHeader: true
        responseForwarding:
          flushInterval: 1s
