<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" width="920" height="280" role="img" aria-labelledby="bpmnTitle">
  <title id="bpmnTitle">Ejemplo BPMN: de pedido recibido a factura enviada</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="920" height="280" fill="#f9fbfa" rx="12"/>
  <text x="460" y="28" text-anchor="middle" fill="#00164f" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="700">Ejemplo BPMN (proceso simplificado: pedido &#8594; factura)</text>
  <!-- Start -->
  <circle cx="50" cy="140" r="18" fill="#fff" stroke="#10b981" stroke-width="3"/>
  <!-- Task 1 -->
  <rect x="100" y="110" width="120" height="60" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="135" text-anchor="middle" fill="#00164f" font-size="11" font-weight="600">Recibir</text>
  <text x="160" y="152" text-anchor="middle" fill="#00164f" font-size="11" font-weight="600">pedido</text>
  <!-- Task 2 -->
  <rect x="260" y="110" width="120" height="60" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="320" y="135" text-anchor="middle" fill="#00164f" font-size="11" font-weight="600">Validar</text>
  <text x="320" y="152" text-anchor="middle" fill="#00164f" font-size="11" font-weight="600">stock (ERP)</text>
  <!-- Gateway -->
  <polygon points="420,140 450,110 480,140 450,170" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
  <text x="450" y="145" text-anchor="middle" fill="#1e3a8a" font-size="10" font-weight="700">?</text>
  <!-- Task 3 -->
  <rect x="510" y="110" width="120" height="60" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="570" y="135" text-anchor="middle" fill="#00164f" font-size="11" font-weight="600">Generar</text>
  <text x="570" y="152" text-anchor="middle" fill="#00164f" font-size="11" font-weight="600">factura</text>
  <!-- Task 4 -->
  <rect x="670" y="110" width="120" height="60" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="730" y="135" text-anchor="middle" fill="#00164f" font-size="11" font-weight="600">Enviar</text>
  <text x="730" y="152" text-anchor="middle" fill="#00164f" font-size="11" font-weight="600">al cliente</text>
  <!-- End -->
  <circle cx="850" cy="140" r="18" fill="#fff" stroke="#10b981" stroke-width="3"/>
  <circle cx="850" cy="140" r="12" fill="none" stroke="#10b981" stroke-width="3"/>
  <!-- Arrows -->
  <line x1="68" y1="140" x2="98" y2="140" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="220" y1="140" x2="258" y2="140" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="140" x2="418" y2="140" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="140" x2="508" y2="140" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="630" y1="140" x2="668" y2="140" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="790" y1="140" x2="830" y2="140" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Lane labels -->
  <text x="24" y="220" fill="#6b7280" font-size="10">O: inicio/fin</text>
  <text x="160" y="220" fill="#6b7280" font-size="10">&#9634;: tarea</text>
  <text x="450" y="220" fill="#6b7280" font-size="10">&#9670;: decisi&#243;n</text>
  <text x="620" y="220" fill="#6b7280" font-size="10">Sistemas: ERP, email</text>
  <text x="460" y="255" text-anchor="middle" fill="#9ca3af" font-size="10">Entregable real en consulta: diagrama completo con excepciones, roles y tiempos</text>
</svg>
