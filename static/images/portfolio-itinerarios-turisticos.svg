<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Plataforma de itinerarios turisticos con mapa e IA">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EBFAFA"/>
      <stop offset="100%" stop-color="#D1F0F0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#136594"/>
      <stop offset="100%" stop-color="#4DAFBA"/>
    </linearGradient>
    <linearGradient id="route" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4DAFBA"/>
      <stop offset="100%" stop-color="#136594"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#136594" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow-light" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#136594" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Background matching existing portfolio cards -->
  <rect width="1200" height="750" fill="url(#bg)"/>
  
  <!-- Subtle decorative background circles using palette colors -->
  <circle cx="980" cy="120" r="240" fill="#A8DBE0" opacity="0.3"/>
  <circle cx="180" cy="620" r="300" fill="#86B3D3" opacity="0.2"/>

  <!-- Map panel -->
  <g filter="url(#shadow)">
    <rect x="80" y="90" width="720" height="520" rx="24" fill="#FFFFFF"/>
    <rect x="80" y="90" width="720" height="72" rx="24" fill="#F6FAFA"/>
    <rect x="80" y="138" width="720" height="24" fill="#F6FAFA"/>
    
    <!-- Window controls -->
    <circle cx="118" cy="126" r="10" fill="#A8DBE0"/>
    <circle cx="148" cy="126" r="10" fill="#86B3D3"/>
    <circle cx="178" cy="126" r="10" fill="#4DAFBA"/>
    
    <text x="210" y="132" font-family="system-ui,sans-serif" font-size="22" fill="#136594" font-weight="600">Ruta personalizada - Centro historico</text>
    
    <!-- Stylized map blocks using palette -->
    <rect x="120" y="210" width="180" height="120" rx="12" fill="#EBFAFA"/>
    <rect x="330" y="190" width="140" height="100" rx="12" fill="#A8DBE0" opacity="0.5"/>
    <rect x="500" y="240" width="160" height="130" rx="12" fill="#86B3D3" opacity="0.3"/>
    <rect x="220" y="360" width="200" height="140" rx="12" fill="#4DAFBA" opacity="0.2"/>
    <rect x="470" y="390" width="190" height="110" rx="12" fill="#EBFAFA"/>
    
    <!-- Route path -->
    <path d="M170 270 C 250 250, 300 220, 390 240 S 520 300, 580 320 S 650 380, 620 450" fill="none" stroke="url(#route)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- POI Points -->
    <circle cx="170" cy="270" r="14" fill="#136594" stroke="#FFFFFF" stroke-width="4"/>
    <circle cx="390" cy="240" r="12" fill="#4DAFBA" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="580" cy="320" r="12" fill="#4DAFBA" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="620" cy="450" r="14" fill="#1A6592" stroke="#FFFFFF" stroke-width="4"/>
  </g>

  <!-- Phone mockup -->
  <g filter="url(#shadow)">
    <rect x="860" y="170" width="250" height="480" rx="32" fill="#FFFFFF" stroke="#86B3D3" stroke-width="4"/>
    <rect x="880" y="210" width="210" height="400" rx="16" fill="#F6FAFA"/>
    
    <!-- Phone UI elements -->
    <rect x="900" y="240" width="170" height="24" rx="6" fill="#A8DBE0"/>
    <rect x="900" y="280" width="120" height="16" rx="4" fill="#86B3D3" opacity="0.5"/>
    
    <!-- Cards inside phone -->
    <rect x="900" y="320" width="170" height="90" rx="12" fill="#FFFFFF" filter="url(#shadow-light)"/>
    <rect x="920" y="340" width="40" height="40" rx="8" fill="#4DAFBA" opacity="0.2"/>
    <rect x="975" y="345" width="75" height="12" rx="6" fill="#136594" opacity="0.8"/>
    <rect x="975" y="365" width="50" height="10" rx="5" fill="#86B3D3"/>
    
    <rect x="900" y="430" width="170" height="90" rx="12" fill="#FFFFFF" filter="url(#shadow-light)"/>
    <rect x="920" y="450" width="40" height="40" rx="8" fill="#136594" opacity="0.15"/>
    <rect x="975" y="455" width="60" height="12" rx="6" fill="#136594" opacity="0.8"/>
    <rect x="975" y="475" width="80" height="10" rx="5" fill="#86B3D3"/>
    
    <!-- Phone Action Button -->
    <rect x="900" y="540" width="170" height="44" rx="22" fill="url(#accent)"/>
    <text x="985" y="568" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">Mi ruta</text>
  </g>

  <!-- Badges -->
  <g filter="url(#shadow-light)">
    <rect x="80" y="640" width="210" height="44" rx="22" fill="#FFFFFF" stroke="#4DAFBA" stroke-width="2"/>
    <text x="185" y="669" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#136594" font-weight="600">Multi-ciudad</text>
    
    <rect x="310" y="640" width="180" height="44" rx="22" fill="#FFFFFF" stroke="#86B3D3" stroke-width="2"/>
    <text x="400" y="669" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#136594" font-weight="600">IA + mapas</text>
    
    <rect x="510" y="640" width="220" height="44" rx="22" fill="#FFFFFF" stroke="#A8DBE0" stroke-width="2"/>
    <text x="620" y="669" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#136594" font-weight="600">Panel de gestion</text>
  </g>
</svg>