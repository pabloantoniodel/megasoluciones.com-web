# NGINX — Consolidación megasolucion.com → megasolucion.es
# Incluir en server blocks o adaptar a tu instalación.
# Requiere certificados SSL para ambos dominios.

# --- BLOQUE 1: megasolucion.com y www.megasolucion.com → 301 a .es ---
server {
    listen 80;
    listen [::]:80;
    server_name megasolucion.com www.megasolucion.com;
    return 301 https://megasolucion.es$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name megasolucion.com www.megasolucion.com;

    ssl_certificate     /etc/letsencrypt/live/megasolucion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/megasolucion.com/privkey.pem;

    # robots.txt en .com: bloquear indexación (opcional si ya hay 301 en todo)
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # Cualquier ruta → equivalente en .es (301 permanente)
    location / {
        return 301 https://megasolucion.es$request_uri;
    }
}

# --- BLOQUE 2: www.megasolucion.es → apex .es ---
server {
    listen 80;
    listen [::]:80;
    server_name www.megasolucion.es;
    return 301 https://megasolucion.es$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.megasolucion.es;

    ssl_certificate     /etc/letsencrypt/live/megasolucion.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/megasolucion.es/privkey.pem;

    return 301 https://megasolucion.es$request_uri;
}

# --- BLOQUE 3: megasolucion.es — dominio principal (proxy a Flask/Gunicorn) ---
server {
    listen 80;
    listen [::]:80;
    server_name megasolucion.es;
    return 301 https://megasolucion.es$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name megasolucion.es;

    ssl_certificate     /etc/letsencrypt/live/megasolucion.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/megasolucion.es/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
