# Override para exponer Megasoluciones en https (megasolucion.com y megasolucion.es) vía Traefik (Dokploy).
# Uso: docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
#
# Requisitos:
# - DNS: megasolucion.com y megasolucion.es (y www) → IP del servidor. Puertos 80 y 443 abiertos.
# - Certificados SSL: Let's Encrypt (certresolver=letsencrypt) los genera automáticamente.
#
# Acceso OBLIGATORIO por dominio: el puerto 5000 no se expone; solo Traefik (80/443) puede acceder.

services:
  megasoluciones:
    ports: []  # Desactivar puerto 5000 público
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - MAIL_SERVER=${MAIL_SERVER:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-True}
      - MAIL_USE_SSL=${MAIL_USE_SSL:-False}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER:-info@megasolucion.net}
    labels:
      - "traefik.enable=true"
      
      # HTTP → HTTPS redirect (megasolucion.com + megasolucion.es)
      - "traefik.http.routers.megasoluciones-http.rule=Host(`megasolucion.com`) || Host(`www.megasolucion.com`) || Host(`megasolucion.es`) || Host(`www.megasolucion.es`)"
      - "traefik.http.routers.megasoluciones-http.entrypoints=web"
      - "traefik.http.routers.megasoluciones-http.service=megasoluciones-service"
      - "traefik.http.routers.megasoluciones-http.middlewares=megasoluciones-redirect"
      - "traefik.http.middlewares.megasoluciones-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.megasoluciones-redirect.redirectscheme.permanent=true"
      
      # HTTPS con certificados Let's Encrypt (megasolucion.com + megasolucion.es)
      - "traefik.http.routers.megasoluciones.rule=Host(`megasolucion.com`) || Host(`www.megasolucion.com`) || Host(`megasolucion.es`) || Host(`www.megasolucion.es`)"
      - "traefik.http.routers.megasoluciones.entrypoints=websecure"
      - "traefik.http.routers.megasoluciones.tls.certresolver=letsencrypt"
      - "traefik.http.routers.megasoluciones.service=megasoluciones-service"
      - "traefik.http.routers.megasoluciones.middlewares=megasoluciones-headers"
      
      # Headers HTTPS
      - "traefik.http.middlewares.megasoluciones-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.megasoluciones-headers.headers.customrequestheaders.X-Forwarded-For="
      
      # Service (puerto interno Flask)
      - "traefik.http.services.megasoluciones-service.loadbalancer.server.port=5000"
      # Timeout respuesta (evitar 502 Bad Gateway si la app tarda)
      - "traefik.http.services.megasoluciones-service.loadbalancer.responseForwarding.flushInterval=1s"
      
      # Red Traefik (OBLIGATORIO: Traefik debe poder alcanzar este contenedor)
      - "traefik.docker.network=dokploy-network"
      
    networks:
      - megasoluciones-network
      - dokploy-network

networks:
  dokploy-network:
    name: dokploy-network
    external: true
